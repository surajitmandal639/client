<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .float {
      animation: float 3s ease-in-out infinite;
    }
    .float2 {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }
  </style>

  <!-- Background -->
  <rect width="500" height="400" rx="20" fill="#f4f4f5" />

  <!-- Laptop -->
  <rect x="150" y="150" width="200" height="120" rx="10" fill="#18181b"/>
  <rect x="170" y="170" width="160" height="80" rx="5" fill="#3f3f46"/>

  <!-- Floating elements -->
  <circle cx="120" cy="120" r="10" fill="#6366f1" class="float"/>
  <circle cx="380" cy="100" r="8" fill="#22c55e" class="float2"/>
  <circle cx="250" cy="80" r="6" fill="#f59e0b" class="float"/>

  <!-- Code lines -->
  <rect x="180" y="180" width="100" height="8" rx="4" fill="#a1a1aa"/>
  <rect x="180" y="200" width="80" height="8" rx="4" fill="#71717a"/>
  <rect x="180" y="220" width="120" height="8" rx="4" fill="#a1a1aa"/>

</svg>